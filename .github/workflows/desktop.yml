name: Build desktop theme manager

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/theme-manager/**"
      - "packages/full-skin/**"
      - "scripts/prepare-desktop.mjs"
      - "scripts/capture-full-skin-screenshots.mjs"
      - "scripts/smoke-theme-manager.mjs"
      - "scripts/lib/png.mjs"
      - "themes/catalog.json"
      - "themes/source-art/**"
      - "screenshots/**"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/theme-manager/**"
      - "packages/full-skin/**"
      - "scripts/prepare-desktop.mjs"
      - "scripts/capture-full-skin-screenshots.mjs"
      - "scripts/smoke-theme-manager.mjs"
      - "scripts/lib/png.mjs"
      - "themes/catalog.json"
      - "themes/source-art/**"
      - "screenshots/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Generate, validate, and test public artifacts
        run: npm run generate && npm run validate && npm test

  desktop:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: ""
            build-args: "--bundles nsis"
            artifact: desktop-windows-x64
            artifact-path: apps/theme-manager/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-14
            rust-target: aarch64-apple-darwin
            build-args: "--target aarch64-apple-darwin --bundles app,dmg"
            artifact: desktop-macos-arm64
            artifact-path: apps/theme-manager/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-14
            rust-target: x86_64-apple-darwin
            build-args: "--target x86_64-apple-darwin --bundles app,dmg"
            artifact: desktop-macos-x64
            artifact-path: apps/theme-manager/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/theme-manager/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/theme-manager/src-tauri -> target

      - name: Generate, validate, and prepare desktop assets
        run: npm run generate && npm run validate && npm run desktop:prepare

      - name: Install desktop dependencies
        run: npm ci --prefix apps/theme-manager

      - name: Test the Rust catalog and command boundary
        run: npm run desktop:check

      - name: Build platform-untrusted CI artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || vars.DESKTOP_RELEASE_READY != 'true' }}
        working-directory: apps/theme-manager
        run: npm run tauri -- build ${{ matrix.build-args }}

      - name: Verify macOS disk image, bundle identity, and ad-hoc signature
        if: ${{ (!startsWith(github.ref, 'refs/tags/v') || vars.DESKTOP_RELEASE_READY != 'true') && startsWith(matrix.os, 'macos-') }}
        shell: bash
        run: |
          artifacts=( ${{ matrix.artifact-path }} )
          if [ "${#artifacts[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one macOS DMG, found ${#artifacts[@]}."
            exit 1
          fi

          dmg="${artifacts[0]}"
          hdiutil verify "$dmg"
          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" >/dev/null 2>&1 || true
            rm -rf "$mount_dir"
          }
          trap cleanup EXIT
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"

          app_path="$(find "$mount_dir" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::The DMG does not contain a macOS application bundle."
            exit 1
          fi

          info_plist="$app_path/Contents/Info.plist"
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$info_plist")"
          executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$info_plist")"
          if [ "$bundle_id" != "io.github.rwang23.awesomecodextheme" ]; then
            echo "::error::Unexpected macOS bundle identifier: $bundle_id"
            exit 1
          fi

          executable="$app_path/Contents/MacOS/$executable_name"
          if [ ! -x "$executable" ]; then
            echo "::error::The declared macOS executable is missing or not executable."
            exit 1
          fi

          architectures="$(lipo -archs "$executable")"
          case "${{ matrix.rust-target }}" in
            aarch64-apple-darwin) expected_architecture="arm64" ;;
            x86_64-apple-darwin) expected_architecture="x86_64" ;;
            *)
              echo "::error::Unexpected Rust target: ${{ matrix.rust-target }}"
              exit 1
              ;;
          esac
          if ! grep -qw "$expected_architecture" <<<"$architectures"; then
            echo "::error::Expected $expected_architecture but found: $architectures"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          signing_details="$(codesign --display --verbose=4 "$app_path" 2>&1)"
          if ! grep -q "^Signature=adhoc$" <<<"$signing_details"; then
            echo "::error::Expected an ad-hoc macOS signature."
            echo "$signing_details"
            exit 1
          fi

      - name: Upload platform-untrusted CI artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || vars.DESKTOP_RELEASE_READY != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Check updater release credentials
        if: startsWith(github.ref, 'refs/tags/v') && vars.DESKTOP_RELEASE_READY == 'true'
        shell: bash
        env:
          ACT_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          for name in ACT_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for signed updater artifacts."
              exit 1
            fi
          done

      - name: Build updater-signed beta artifacts and publish the tagged release
        if: startsWith(github.ref, 'refs/tags/v') && vars.DESKTOP_RELEASE_READY == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACT_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/theme-manager
          args: "--config src-tauri/tauri.release.conf.json ${{ matrix.build-args }}"
          tagName: ${{ github.ref_name }}
          releaseName: "Awesome Codex Theme ${{ github.ref_name }}"
          releaseBody: "Updater-signed Tauri Theme Manager beta with ACT Full Skin v1. Windows Authenticode and Apple Developer ID signing/notarization are not included in this beta, so the operating system may show an unknown-publisher warning. macOS bundles carry an ad-hoc signature for package integrity only. The app applies verified backgrounds, materials, colors, and theme copy without modifying ChatGPT application files."
          prerelease: false
          releaseDraft: true

      - name: Verify release macOS disk image and ad-hoc signature
        if: startsWith(github.ref, 'refs/tags/v') && vars.DESKTOP_RELEASE_READY == 'true' && startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          artifacts=( ${{ matrix.artifact-path }} )
          if [ "${#artifacts[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one release DMG, found ${#artifacts[@]}."
            exit 1
          fi

          dmg="${artifacts[0]}"
          hdiutil verify "$dmg"
          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" >/dev/null 2>&1 || true
            rm -rf "$mount_dir"
          }
          trap cleanup EXIT
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          app_path="$(find "$mount_dir" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::The release DMG does not contain a macOS application bundle."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          signing_details="$(codesign --display --verbose=4 "$app_path" 2>&1)"
          if ! grep -q "^Signature=adhoc$" <<<"$signing_details"; then
            echo "::error::Expected an ad-hoc macOS signature."
            echo "$signing_details"
            exit 1
          fi

          updater_archives=( apps/theme-manager/src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz )
          updater_signatures=( apps/theme-manager/src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app.tar.gz.sig )
          if [ "${#updater_archives[@]}" -ne 1 ] || [ "${#updater_signatures[@]}" -ne 1 ]; then
            echo "::error::Expected one macOS updater archive and one signature."
            exit 1
          fi
          test -s "${updater_archives[0]}"
          test -s "${updater_signatures[0]}"
