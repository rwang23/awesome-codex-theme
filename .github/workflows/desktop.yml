name: Build desktop theme manager

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/theme-manager/**"
      - "scripts/prepare-desktop.mjs"
      - "scripts/lib/png.mjs"
      - "themes/catalog.json"
      - "themes/source-art/**"
      - "screenshots/**"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "apps/theme-manager/**"
      - "scripts/prepare-desktop.mjs"
      - "scripts/lib/png.mjs"
      - "themes/catalog.json"
      - "themes/source-art/**"
      - "screenshots/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Generate, validate, and test public artifacts
        run: npm run generate && npm run validate && npm test

  desktop:
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: ""
            build-args: "--bundles nsis"
            artifact: desktop-windows-x64
            artifact-path: apps/theme-manager/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-14
            rust-target: aarch64-apple-darwin
            build-args: "--target aarch64-apple-darwin --bundles dmg"
            artifact: desktop-macos-arm64
            artifact-path: apps/theme-manager/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-14
            rust-target: x86_64-apple-darwin
            build-args: "--target x86_64-apple-darwin --bundles dmg"
            artifact: desktop-macos-x64
            artifact-path: apps/theme-manager/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/theme-manager/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/theme-manager/src-tauri -> target

      - name: Generate and validate the theme Registry
        run: npm run generate && npm run validate

      - name: Install desktop dependencies
        run: npm ci --prefix apps/theme-manager

      - name: Test the Rust catalog and command boundary
        if: matrix.os == 'windows-latest'
        run: npm run desktop:check

      - name: Build unsigned CI artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || vars.DESKTOP_RELEASE_READY != 'true' }}
        working-directory: apps/theme-manager
        run: npm run tauri -- build ${{ matrix.build-args }}

      - name: Upload unsigned CI artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || vars.DESKTOP_RELEASE_READY != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Build signed updater artifacts and publish the tagged release
        if: startsWith(github.ref, 'refs/tags/v') && vars.DESKTOP_RELEASE_READY == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACT_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        with:
          projectPath: apps/theme-manager
          args: "--config src-tauri/tauri.release.conf.json ${{ matrix.build-args }}"
          tagName: ${{ github.ref_name }}
          releaseName: "Awesome Codex Theme ${{ github.ref_name }}"
          releaseBody: "Tauri Theme Manager beta. Theme import remains an explicit action inside ChatGPT."
          prerelease: true
          releaseDraft: true
